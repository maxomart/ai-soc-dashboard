<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" fill="none" role="img" aria-labelledby="bt bd">
  <title id="bt">AI SOC Dashboard</title>
  <desc id="bd">A real-time Security Operations Center with AI triage. Dark banner with an indigo radar sweep, alert markers and a telemetry waveform.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0b14"/>
      <stop offset="0.55" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sweep" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(980 200) rotate(-32) scale(150)">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="80" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="0.7" stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <ellipse cx="170" cy="120" rx="520" ry="360" fill="url(#glowL)"/>
  <ellipse cx="1080" cy="320" rx="420" ry="300" fill="url(#glowR)"/>

  <!-- Faint dotted grid -->
  <g fill="#3f3f55" fill-opacity="0.22">
    <circle cx="80" cy="60" r="1.3"/><circle cx="160" cy="60" r="1.3"/><circle cx="240" cy="60" r="1.3"/><circle cx="320" cy="60" r="1.3"/>
    <circle cx="80" cy="140" r="1.3"/><circle cx="160" cy="140" r="1.3"/><circle cx="240" cy="140" r="1.3"/><circle cx="320" cy="140" r="1.3"/>
    <circle cx="80" cy="220" r="1.3"/><circle cx="160" cy="220" r="1.3"/><circle cx="240" cy="220" r="1.3"/>
    <circle cx="80" cy="300" r="1.3"/><circle cx="160" cy="300" r="1.3"/>
  </g>

  <!-- Radar motif (right) -->
  <g transform="translate(980 200)" stroke="#6366f1" fill="none">
    <circle r="150" stroke-opacity="0.18" stroke-width="1"/>
    <circle r="110" stroke-opacity="0.22" stroke-width="1"/>
    <circle r="70"  stroke-opacity="0.28" stroke-width="1"/>
    <circle r="30"  stroke-opacity="0.35" stroke-width="1"/>
    <line x1="-150" y1="0" x2="150" y2="0" stroke-opacity="0.14" stroke-width="1"/>
    <line x1="0" y1="-150" x2="0" y2="150" stroke-opacity="0.14" stroke-width="1"/>
    <line x1="-106" y1="-106" x2="106" y2="106" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="106" y1="-106" x2="-106" y2="106" stroke-opacity="0.1" stroke-width="1"/>
  </g>
  <!-- Sweep wedge -->
  <path d="M980 200 L980 50 A150 150 0 0 1 1107 118 Z" fill="url(#sweep)"/>
  <line x1="980" y1="200" x2="1107" y2="118" stroke="#818cf8" stroke-width="2" stroke-opacity="0.8"/>

  <!-- Radar alert blips with severity colors -->
  <g>
    <circle cx="1042" cy="150" r="5" fill="#ef4444"/>
    <circle cx="1042" cy="150" r="11" fill="none" stroke="#ef4444" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="918"  cy="248" r="4" fill="#f97316"/>
    <circle cx="918"  cy="248" r="9" fill="none" stroke="#f97316" stroke-opacity="0.45" stroke-width="1.5"/>
    <circle cx="1018" cy="262" r="3.5" fill="#f59e0b"/>
    <circle cx="952"  cy="156" r="3" fill="#10b981"/>
  </g>

  <!-- Telemetry waveform across the lower band -->
  <path d="M80 322 L150 322 L172 300 L196 300 L214 270 L236 348 L262 322 L330 322 L352 304 L372 304 L392 248 L414 360 L436 322 L520 322 L544 308 L566 308 L586 286 L606 286 L626 322 L720 322 L744 300 L760 322"
        stroke="url(#wave)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brand chip -->
  <g transform="translate(80 70)">
    <rect width="46" height="46" rx="12" fill="#6366f1" fill-opacity="0.14" stroke="#6366f1" stroke-opacity="0.5"/>
    <path d="M23 9 L9 14.5 V25 c0 8.2 6 14.3 14 17 8-2.7 14-8.8 14-17 V14.5 L23 9Z"
          fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round"/>
    <path d="M15 25 h3 l2.4 6 4-13 2.4 7 H34" fill="none" stroke="#a5b4fc" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="142" y="92" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="600" letter-spacing="4" fill="#a5b4fc">SECURITY OPERATIONS CENTER</text>

  <!-- Headline -->
  <text x="78" y="200" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="74" font-weight="800" letter-spacing="-1.5" fill="#fafafa">AI SOC Dashboard</text>

  <!-- Tagline -->
  <text x="80" y="246" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400" fill="#a1a1aa">Real-time threat monitoring with a live event stream, a severity</text>
  <text x="80" y="278" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400" fill="#a1a1aa">engine and AI-powered incident triage.</text>

  <!-- Feature pills -->
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="500">
    <g transform="translate(80 318)">
      <rect width="118" height="30" rx="15" fill="#18181b" stroke="#6366f1" stroke-opacity="0.4"/>
      <circle cx="18" cy="15" r="3" fill="#6366f1"/>
      <text x="30" y="20" fill="#d4d4d8">SSE live feed</text>
    </g>
    <g transform="translate(210 318)">
      <rect width="150" height="30" rx="15" fill="#18181b" stroke="#6366f1" stroke-opacity="0.4"/>
      <circle cx="18" cy="15" r="3" fill="#10b981"/>
      <text x="30" y="20" fill="#d4d4d8">Severity scoring</text>
    </g>
    <g transform="translate(372 318)">
      <rect width="120" height="30" rx="15" fill="#18181b" stroke="#6366f1" stroke-opacity="0.4"/>
      <circle cx="18" cy="15" r="3" fill="#f97316"/>
      <text x="30" y="20" fill="#d4d4d8">AI triage</text>
    </g>
  </g>

  <!-- Frame accent -->
  <rect x="1" y="1" width="1198" height="398" rx="0" fill="none" stroke="#6366f1" stroke-opacity="0.12" stroke-width="2"/>
</svg>
